org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
android.enableJetifier=true
# Disable Kotlin incremental caches to avoid incremental cache root issues
# (helps build stability on some Windows setups with multi-drive paths)
kotlin.incremental=false
# Force in-process Kotlin compiler to avoid daemon cache issues
kotlin.compiler.execution.strategy=in-process
